[cosmological_parameters]
; ==============================================================
; Training values file for CAMB emulator
; Convention: physical density fractions (Ω), NOT h² units
; ==============================================================

; Hubble parameter: H0 = h0 * 100 km/s/Mpc
; Range: [0.4, 1.0] -> H0 in [40, 100] km/s/Mpc
h0 = 0.4 0.7 1.0

; Total matter density fraction today
; Range: [0.02, 1.0] (very wide for emulator coverage)
omega_m = 0.02 0.3 1.0

; Baryon density fraction today
; Range: [0.05, 0.06] (relatively narrow, well-constrained)
omega_b = 0.05 0.055 0.06

; Spatial curvature (fixed to flat)
omega_k = 0.0

; Optical depth to reionization (fixed)
tau = 0.08

; Primordial scalar amplitude: log(10^10 A_s)
; Range: [-3.0, 7.0] (very wide for emulator coverage)
log1e10As = -3.0 3.0 7.0

; Scalar spectral index
; Range: [0.87, 1.07]
n_s = 0.87 0.97 1.07

; Dark energy equation of state (fixed to ΛCDM)
w = -1.0
wa = 0.0

; ==============================================================
; Neutrino physics
; ==============================================================

; Sum of neutrino masses in eV
; Range: [0.0, 0.2] eV
mnu = 0.0 0.06 0.2

; Number of massive neutrino species
num_massive_neutrinos = 3

; Effective relativistic degrees of freedom
nnu = 3.046

; Neutrino mass hierarchy (1 = normal)
neutrino_hierarchy = 1
