[runtime]
; Use list sampler to iterate through LHS parameter samples
sampler = list

[list]
filename = ./LHS_params.list

[output]
save_dir = ./output
filename = ./output/camb_training
format = text
verbosity = quiet

[pipeline]
modules = consistency camb save_pk
values = ./values_training.ini
quiet = True
debug = False
timing = True

[consistency]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/consistency/consistency_interface.py

[camb]
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/camb/camb_interface.py

; Non-linear prescription
halofit_version = takahashi

; k-mode settings
kmin = 1e-5
kmax = 50.0
nk = 200

; Redshift settings - output P(k) at multiple z values
; Range: z = 0 to 2, with 100 bins
zmin = 0.0
zmax = 2.0
nz = 100

; Output settings
mode = all
power_spectra = delta_tot
nonlinear = both

; Verbosity
feedback = 0

; Accuracy settings (optional, uncomment for higher precision)
; accuracy_boost = 1.1
; l_accuracy_boost = 1.1

[save_pk]
file = ./save_pk_training.py
