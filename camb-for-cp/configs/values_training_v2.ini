[cosmological_parameters]
; ==============================================================
; v2 training values: z=0 linear emulator
; Convention: physical density fractions (Omega), NOT h^2 units.
; ==============================================================

; H0 = h0 * 100 km/s/Mpc; range [40, 100] km/s/Mpc
h0 = 0.4 0.7 1.0

; Total matter density fraction today. Effective range [0.07, 0.71],
; driven by LHS of omega_cdm in [0.02, 0.65] plus omega_b.
omega_m = 0.02 0.3 1.0

; Baryon density fraction today
omega_b = 0.05 0.055 0.06

; Spatial curvature (fixed, flat)
omega_k = 0.0

; Optical depth to reionization (fixed)
tau = 0.08

; log(10^10 A_s). Planck 2018: 3.044 +/- 0.014; range is +/-100 sigma.
log1e10As = 1.64 3.044 4.44

; Scalar spectral index
n_s = 0.87 0.97 1.07

; Dark energy equation of state (fixed, LCDM)
w = -1.0
wa = 0.0

; ==============================================================
; Neutrino physics
; ==============================================================

; Sum of neutrino masses in eV
mnu = 0.0 0.06 0.2

; Number of massive neutrino species
num_massive_neutrinos = 3

; Effective relativistic DOF
nnu = 3.046

; Neutrino mass hierarchy (1 = normal)
neutrino_hierarchy = 1
