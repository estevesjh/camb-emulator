[runtime]
sampler = list

[list]
filename = ${LHS_SLICE_FILE}
limits = T

[output]
save_dir = ./output_1M_array
filename = ./output_1M_array/camb_1M_${SLICE_ID}
format = text
verbosity = quiet
lock = F

[pipeline]
modules = consistency camb save_pk
values = ./configs/values_training_1M.ini
quiet = True
debug = False
timing = True

[consistency]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/consistency/consistency_interface.py

[camb]
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/camb/camb_interface.py

halofit_version = takahashi

kmin = 1e-4
kmax = 50.0
nk = 506

zmin = 0.0
zmax = 0.05
nz = 2

zmin_background = 0.0
zmax_background = 3.0
nz_background = 100

mode = all
power_spectra = delta_tot delta_nonu
nonlinear = none

feedback = 0

[save_pk]
file = ./scripts/save_pk_training_v2.py
