[runtime]
sampler = list

[list]
filename = ./data/LHS_params_v2_100k.list

[output]
save_dir = ./output_v2
filename = ./output_v2/camb_training_v2
format = text
verbosity = quiet
lock = F

[pipeline]
modules = consistency camb save_pk
values = ./configs/values_training_v2.ini
quiet = True
debug = False
timing = True

[consistency]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/consistency/consistency_interface.py

[camb]
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/camb/camb_interface.py

; Linear only; no halofit. No redshift evolution stored.
halofit_version = takahashi

kmin = 1e-4
kmax = 50.0
nk = 506

; Effectively z=0: save_pk_training_v2.py only writes the z=0 row.
; nz must be >= 2 because CAMB's growth-factor array is stored via a
; datablock call that rejects 0-dim arrays (fails on nz=1).
zmin = 0.0
zmax = 0.05
nz = 2

; save_distances() runs unconditionally and breaks on zmax_background=0,
; so set the background grid to something > 0 even though we don't use it.
zmin_background = 0.0
zmax_background = 3.0
nz_background = 100

mode = all
power_spectra = delta_tot delta_nonu
nonlinear = none

feedback = 0

[save_pk]
file = ./scripts/save_pk_training_v2.py
