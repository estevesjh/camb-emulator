[cosmological_parameters]
; ==============================================================
; 1M (v3) training values: z=0 linear emulator, wide/dense/ultra LHS
; Convention: physical density fractions (Omega), NOT h^2 units.
; Ranges are union of the three LHS boxes so no sample is rejected
; by the list sampler as out-of-prior.
; ==============================================================

; H0 = h0 * 100 km/s/Mpc
; Wide: [0.473, 0.873], Dense: [0.573, 0.773], Ultra: [0.623, 0.723]
h0 = 0.4 0.673 1.0

; Total matter density fraction today. Derived from omega_cdm h^2 and
; omega_b h^2 in the LHS; widest envelope is [0.11, 0.90] for the wide
; box. Loosen to [0.05, 1.0] to accept any sample without rejection.
omega_m = 0.05 0.315 1.0

; Baryon density fraction today (derived from omega_b h^2).
; Widest envelope (wide box, h extremes) is [0.016, 0.144]. Loosen to
; [0.01, 0.20] so list-sampler accepts all rows.
omega_b = 0.01 0.0493 0.20

; Spatial curvature (fixed, flat)
omega_k = 0.0

; Optical depth to reionization (fixed)
tau = 0.08

; log(10^10 A_s). Wide: [2.45, 3.65]; keep v2's very broad prior so any
; future retrain in an even wider box still fits.
log1e10As = 1.64 3.05 4.44

; Scalar spectral index. Wide: [0.823, 1.103]
n_s = 0.8 0.965 1.15

; Dark energy equation of state (fixed, LCDM)
w = -1.0
wa = 0.0

; ==============================================================
; Neutrino physics
; ==============================================================

; Sum of neutrino masses in eV
mnu = 0.0 0.06 0.2

; Number of massive neutrino species
num_massive_neutrinos = 3

; Effective relativistic DOF
nnu = 3.046

; Neutrino mass hierarchy (1 = normal)
neutrino_hierarchy = 1
